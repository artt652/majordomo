name: PHP Compatibility Check

on:
  push:
    branches: [ alpha-test ]
    paths:
      - '**.php'
      - '**.ini'
      - '.github/workflows/php-compat.yml'
  pull_request:
    branches: [ alpha-test ]
    paths:
      - '**.php'
      - '**.ini'
  workflow_dispatch:

# Все джобы информационные — никогда не блокируют merge.
# all-checks-passed всегда green, нужен только для branch protection rules.

jobs:

  # ============================================================
  # JOB 1: Синтаксический lint — php -l на матрице версий
  # ============================================================
  php-lint:
    name: "Lint PHP ${{ matrix.php-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, curl, xml, mysqli, json
          coverage: none
          tools: none

      - name: "php -l on all PHP files"
        continue-on-error: true
        run: |
          set +e
          echo "=== PHP ${{ matrix.php-version }} syntax check ==="

          ERRORS=0
          while IFS= read -r file; do
            OUTPUT=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              echo "SYNTAX ERROR: $file"
              echo "$OUTPUT"
              LINE=$(echo "$OUTPUT" | grep -oP 'on line \K[0-9]+' | head -1)
              if [ -n "$LINE" ] && [ "$LINE" -gt 0 ] 2>/dev/null; then
                echo "--- context ---"
                awk "NR>=$(( LINE > 3 ? LINE - 3 : 1 )) && NR<=$((LINE+3)) \
                  {printf \"%4d | %s\n\", NR, \$0}" "$file"
              fi
              echo "---"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . \
            -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./cms/cached/*" \
            -not -path "./cms/saverestore/temp/*" \
            -not -path "./lib/mysql.class.php" \
            2>/dev/null)

          echo "Errors: $ERRORS"

  # ============================================================
  # JOB 2: PHPCompatibility — статический анализ
  # Запускаем на PHP 8.1 (стабильный runtime для инструментов).
  # Тестируем диапазон 7.4–8.5.
  # RemovedIconvEncoding исключён — баг в самом сниффе под PHP 8.x:
  # передаёт string вместо array в vsprintf() → TypeError fatal.
  # ============================================================
  php-compatibility:
    name: "PHPCompatibility 7.4-8.5"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: "Install PHPCompatibility + PHPCS"
        run: |
          composer require --dev \
            "squizlabs/php_codesniffer:^3.7" \
            "phpcompatibility/php-compatibility:^9.3" \
            --no-interaction --no-progress --quiet
          vendor/bin/phpcs --config-set \
            installed_paths vendor/phpcompatibility/php-compatibility

      - name: "Run PHPCompatibility 7.4-8.5"
        continue-on-error: true
        run: |
          vendor/bin/phpcs \
            --standard=PHPCompatibility \
            --runtime-set testVersion 7.4-8.5 \
            --extensions=php \
            --ignore=vendor/,cms/cached/,cms/saverestore/temp/,lib/mysql.class.php \
            --exclude=PHPCompatibility.ParameterValues.RemovedIconvEncoding \
            --report=full \
            --report-width=120 \
            -s \
            .

  # ============================================================
  # JOB 3: Majordomo/Termux специфика — grep-проверки
  # ============================================================
  majordomo-specific:
    name: "Majordomo/Termux checks"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "PHP4-style constructors (FATAL в PHP 8)"
        continue-on-error: true
        run: |
          echo "=== PHP4-style constructors ==="
          FOUND=0
          while IFS= read -r -d '' file; do
            classname=$(grep -oP '(?<=^class\s)\w+' "$file" | head -1)
            if [ -n "$classname" ] && grep -qP "^\s+function\s+${classname}\s*\(" "$file"; then
              echo "FILE: $file (class $classname)"
              grep -nB2 -A2 -P "^\s+function\s+${classname}\s*\(" "$file"
              echo "---"
              FOUND=$((FOUND + 1))
            fi
          done < <(find . \
            -name "*.class.php" \
            -not -path "./vendor/*" \
            -not -path "./3rdparty/*" \
            -print0)
          echo "Total: $FOUND file(s) with PHP4 constructors"

      - name: "mysql_* функции (удалены в PHP 7)"
        continue-on-error: true
        run: |
          echo "=== Legacy mysql_* functions ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            --exclude="mysql.class.php" \
            -E '\bmysql_(connect|query|fetch_array|num_rows|error|escape_string|select_db|close)\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found" || echo "OK: none"

      - name: "each() / create_function() (удалены в PHP 8)"
        continue-on-error: true
        run: |
          echo "=== each() / create_function() ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E '\b(each|create_function)\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found" || echo "OK: none"

      - name: 'Curly brace string access $str{n} (удалено в PHP 8)'
        continue-on-error: true
        run: |
          echo "=== Curly brace string access ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E '\$[a-zA-Z_][a-zA-Z0-9_]*\{[0-9]+\}' \
            . 2>/dev/null \
            && echo "^^^ Found" || echo "OK: none"

      - name: 'dollar-brace interpolation ${var} (удалено в PHP 8.3)'
        continue-on-error: true
        run: |
          echo "=== dollar-brace interpolation ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -P '"[^"]*\$\{[a-zA-Z_]' \
            . 2>/dev/null \
            && echo "^^^ Found — fix: \${var} -> {$var}" || echo "OK: none"

      - name: "Backtick оператор (deprecated PHP 8.5)"
        continue-on-error: true
        run: |
          echo "=== Backtick operator ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -P '(?<!\\)`[^`\n]+`' \
            . 2>/dev/null \
            && echo "^^^ Found — fix: shell_exec('cmd')" || echo "OK: none"

      - name: "Non-canonical casts (deprecated PHP 8.5)"
        continue-on-error: true
        run: |
          echo "=== Non-canonical casts (boolean/integer/double/binary) ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E '\((boolean|integer|double|binary)\)' \
            . 2>/dev/null \
            && echo "^^^ Found — fix: bool/int/float/string" || echo "OK: none"

      - name: "sudo / service mysql restart (нет на Termux)"
        continue-on-error: true
        run: |
          echo "=== sudo / service mysql ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E 'sudo\s+service\s+mysql|exec\s*\([^)]*sudo' \
            . 2>/dev/null \
            && echo "^^^ Found — ensure DISABLE_MYSQL_RESTART covers this" || echo "OK: none"

      - name: "/proc/stat|loadavg|uptime (SELinux blocked на Android)"
        continue-on-error: true
        run: |
          echo "=== /proc/ restricted files ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E '["\x27]/proc/(stat|loadavg|uptime|meminfo|cpuinfo)' \
            . 2>/dev/null \
            && echo "^^^ Found" || echo "OK: none"

      - name: "pcntl_* (SELinux blocked на Android)"
        continue-on-error: true
        run: |
          echo "=== pcntl_* functions ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E '\bpcntl_(fork|signal|waitpid|wait|exec|alarm)\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found — SELinux blocks these on Android" || echo "OK: none"

      - name: "Hardcoded /tmp/ (нет на Android)"
        continue-on-error: true
        run: |
          echo "=== Hardcoded /tmp/ paths ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E '["\x27]/tmp/' \
            . 2>/dev/null \
            && echo "^^^ Found — fix: sys_get_temp_dir() or ROOT.'cms/cached/'" || echo "OK: none"

      - name: "Verify opcache_off.ini"
        continue-on-error: true
        run: |
          echo "=== opcache_off.ini check ==="
          INI=$(find . -name "*.ini" -not -path "./vendor/*" \
            -exec grep -l "opcache.enable=0" {} \; | head -1)
          if [ -n "$INI" ]; then
            echo "OK: $INI"
            grep -E "opcache\.enable|error_reporting" "$INI"
          else
            echo "NOT FOUND — php-cgi will crash on Android (shm_open blocked by SELinux)"
          fi

  # ============================================================
  # JOB 4: Code quality
  # ============================================================
  code-quality:
    name: "Code quality"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: '@ оператор с файловыми функциями (PHP 8: игнорируется custom error handler)'
        continue-on-error: true
        run: |
          echo "=== @ operator on filesystem/network calls ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E '@(rmdir|mkdir|unlink|rename|copy|fopen|fclose|fsockopen|file_get_contents|file_put_contents|include|require)\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found — PHP 8: @ не подавляет ошибки при set_error_handler" \
            || echo "OK: none"

      - name: 'Loose comparison с 0 (поведение изменилось в PHP 8)'
        continue-on-error: true
        run: |
          echo "=== Loose == 0 comparisons ==="
          echo "PHP7: 0=='string' → TRUE | PHP8: 0=='string' → FALSE"
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E "\bif\s*\(\s*\\\$[a-zA-Z_]+\s*==\s*0\b|\bif\s*\(\s*0\s*==\s*\\\$[a-zA-Z_]+" \
            . 2>/dev/null \
            && echo "^^^ Found — проверить каждый: возможно нужен === или (int) cast" \
            || echo "OK: none"

      - name: 'count() на результате функций (TypeError в PHP 8 если null)'
        continue-on-error: true
        run: |
          echo "=== count() on function results ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            --exclude-dir=cms \
            -E '\bcount\s*\(\s*(SQLSelect|getList|explode|preg_split)\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found — fix: count(\$arr ?? [])" || echo "OK: none"

      - name: "eval() usage"
        continue-on-error: true
        run: |
          echo "=== eval() ==="
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E '\beval\s*\(' \
            . 2>/dev/null \
            && echo "^^^ Found" || echo "OK: none"

      - name: "Захардкоженные пути к mysql/mysqldump"
        continue-on-error: true
        run: |
          echo "=== Hardcoded mysql binary paths ==="
          echo "На Termux: mysql=mariadb, mysqldump=mariadb-dump"
          grep -rn -B2 -A2 \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E "['\"]\/usr\/bin\/(mysql|mysqldump)" \
            . 2>/dev/null \
            && echo "^^^ Found — fix: defined('PATH_TO_MYSQL') ? PATH_TO_MYSQL : 'mysql'" \
            || echo "OK: none"

      - name: "proc_open/exec/shell_exec — инвентаризация"
        continue-on-error: true
        run: |
          echo "=== proc_open/exec usage (informational) ==="
          grep -rn \
            --include="*.php" \
            --exclude-dir=vendor \
            --exclude-dir=3rdparty \
            -E '\b(proc_open|exec|shell_exec|system|passthru)\s*\(' \
            . 2>/dev/null || echo "none"

  # ============================================================
  # JOB 5: Итоговый статус для branch protection rules
  # Всегда green — джобы выше информационные
  # ============================================================
  all-checks-passed:
    name: "All checks passed"
    runs-on: ubuntu-latest
    needs: [php-lint, php-compatibility, majordomo-specific, code-quality]
    if: always()

    steps:
      - name: "Summary"
        run: |
          echo "================================"
          echo "  PHP COMPATIBILITY REPORT"
          echo "================================"
          echo "php-lint:            ${{ needs.php-lint.result }}"
          echo "php-compatibility:   ${{ needs.php-compatibility.result }}"
          echo "majordomo-specific:  ${{ needs.majordomo-specific.result }}"
          echo "code-quality:        ${{ needs.code-quality.result }}"
          echo ""
          echo "Все джобы информационные."
          echo "Находки видны в логах каждого джоба выше."
          echo "================================"
